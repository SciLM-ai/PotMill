[Main]
resume = 0
entropy = 1
featurize = 1
labeling = 1
fit = 1
pareto = 1
pops = 0
nconfigurations = 500
batch_size = 50
device = cpu

[FitSNAP]
mlip = ACE
chem_elem = W Be
filename = FitSNAP.in

[ourStructureGen]
method = binary
elements = W Be
twojmax = 4
# Non-strict parallel entropy (1 worker/node x 1 core = 4 total). Strict-serial entropy slows to
# ~18 s/config and rising at 500 configs (acceptance gets harder), becoming the pace-setter;
# non-strict stays ~1 s/config and easily keeps the 16 VASP workers fed. Threading does not help.
strict_entropy_decrease = 0
entropy_jobs_per_node = 1
entropy_cores_per_job = 1

[ourLabeling]
calculator = Vasp
label_batch_size = 1
# 8 VASP jobs/node x 12 cores -> 32 concurrent VASP across 4 nodes. Benchmarked as the throughput
# sweet spot for these small cells: 18.5 vs 16.0 configs/h/node at 4x24c (VASP scales sub-linearly,
# so more smaller jobs win); going lower (8c/KPAR=2) reverses it. 8*(1+12)=104 cores/node.
labeling_jobs_per_node = 8
labeling_cores_per_job = 12

[Vasp]
# DFT scalars (encut=500, ismear=0, sigma=0.1, ediff=1e-6, kspacing=0.125, prec=Accurate, nelm=200,
# lorbit=11, xc/pp=pbe, lwave/lcharg=False) come from the backend defaults (vasp-ase-sp.py); any can
# be overridden here. Per-atom MAGMOMs (default 1.0; works for any element) are applied unless ispin=1.
pp_path = /global/cfs/cdirs/m1883/vasp_potpaws
# flux-native launcher: -N 1 confines each VASP's 12 ranks to ONE node (intra-node MPI, no Slingshot
# NIC endpoints) -- WITHOUT -N1 flux spreads ranks across nodes and the concurrent VASP exhaust CXI
# endpoints ("OFI EP enable failed: No space left on device"). -N1 does NOT limit to 1 VASP/node:
# 8 x 12-rank jobs still pack onto a 128-core node. -n must match labeling_cores_per_job; Intel MKL
# + classic Fortran runtime must be on LD_LIBRARY_PATH (set in run_perlmutter_cpu.sh).
command = flux run -N 1 -n 12 -o cpu-affinity=per-task /global/cfs/cdirs/m1883/vasp_bin/vasp_std_pm_cpu_01
# base PAW set + W semi-core potential (from vasp-ase-sp.py); change per element as needed.
setups = recommended W:_sv
# PARALLELIZATION ONLY (does not affect the converged result): KPAR parallelizes the (~150-280)
# k-points across groups; KPAR*NCORE must divide -n (3*4 = 12), and NCORE=4 keeps 4 ranks/k-group
# (KPAR with 1-2 ranks/group SEGVs this VASP build). KPAR=12/24 segfault and NCORE<4 is slower (both
# benchmarked). Every NUMERIC/accuracy setting (encut, ediff, ismear, sigma, prec, nelm, xc, pp,
# lorbit) comes from vasp-ase-sp.py via the backend defaults -- do not override those here.
kpar = 3
ncore = 4
# Coarsened k-mesh for the training set (overrides the vasp-ase-sp.py default of 0.125). At 0.125
# these small cells generate 200-477 irreducible k-points (~30-60 min/SP); 0.2 gives ~8x fewer
# k-points (~5-10 min/SP) with negligible impact on MLIP training forces/energies. Lower toward
# 0.125 if you need maximum fidelity (and budget the much longer runtime).
kspacing = 0.2

[ourFeaturization]
featurize_jobs_per_node = 3
featurize_cores_per_job = 4

[ourFit]
fit_jobs_per_node = 2
fit_cores_per_job = 5
fit_method = svd
n_fold = 3
fit_engine = incremental

[ourHyperparameters]
min_rcut = 5
max_rcut = 6
num_rcut = 3
min_nmax = 8 3
max_nmax = 10 4
min_lmax = 0 1
max_lmax = 0 2
middle_eweight = 10
num_eweights = 3
