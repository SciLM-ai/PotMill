[Main]
resume = 0
entropy = 1
featurize = 1
labeling = 1
fit = 1
pareto = 1
pops = 0
nconfigurations = 4096
batch_size = 128
device = cpu

[FitSNAP]
mlip = ACE
chem_elem = W Be
filename = FitSNAP.in

[ourStructureGen]
method = binary
elements = W Be
twojmax = 4
# Non-strict parallel entropy (1 worker/node x 1 core = 4 total). Strict-serial entropy slows to
# ~18 s/config and rising at 500 configs (acceptance gets harder), becoming the pace-setter;
# non-strict stays ~1 s/config and easily keeps the VASP workers fed. Threading does not help.
strict_entropy_decrease = 0
entropy_jobs_per_node = 1
entropy_cores_per_job = 1

[ourLabeling]
calculator = Vasp
label_batch_size = 1
# NESTED no-orchestrator layout: each worker is a nested flux instance owning labeling_cores_per_job
# cores; the [Vasp] `flux run -n N vasp` runs INSIDE it (flux's PMI, which the Cray binary accepts),
# so VASP's ranks land on the worker's own cores with the broker overlapping -- no wasted orchestrator
# core. Benchmarked (nested, packed, nelm=10, 20-atom cell, 112 cores): 8-rank BEATS 4-rank --
# 8r/KPAR2/NCORE4 = 111.6/h, 8r/KPAR1/NCORE8 ~109/h, 8r/KPAR1/NCORE4 = 107.5/h vs 4r/KPAR1/NCORE4 =
# 98.9/h -- because VASP scales ~2x per step from 4->8 ranks (near-linear: 81.7 -> 42 s/step) while
# halving the job count cuts per-job overhead AND the tail. KPAR1/NCORE8 chosen: tied-fastest, lowest
# memory (~49GB vs KPAR2's 66GB -- no k-group replication), most robust (1 k-group, no k-point-balance
# dependency). >=4 ranks/k-group is the SEGV floor; KPAR=1 (8/group) is safe. 14*8 = 112 VASP cores/node;
# with entropy 1 + featurize 4 + fit 4 = 121/128 (>=2 reserved for the dynamic exe).
labeling_jobs_per_node = 14
labeling_cores_per_job = 8

[Vasp]
# DFT scalars (encut=500, ismear=0, sigma=0.1, ediff=1e-6, kspacing=0.125, prec=Accurate, nelm=200,
# lorbit=11, xc/pp=pbe, lwave/lcharg=False) come from the backend defaults (vasp-ase-sp.py); any can
# be overridden here. Per-atom MAGMOMs (default 1.0; works for any element) are applied unless ispin=1.
pp_path = /global/cfs/cdirs/m1883/vasp_potpaws
# flux-native launcher run INSIDE the worker's nested flux instance (flux_executor_nesting): the
# ranks land on the worker's own cores -> no orchestrator core. -N 1 confines each VASP's ranks to
# ONE node (intra-node MPI; without it flux can spread ranks across nodes and exhaust the Slingshot
# CXI endpoints: "OFI EP enable failed"). -n MUST match labeling_cores_per_job. Intel MKL + classic
# Fortran runtime must be on LD_LIBRARY_PATH (set in run_perlmutter_cpu.sh).
command = flux run -N 1 -n 8 -o cpu-affinity=per-task /global/cfs/cdirs/m1883/vasp_bin/vasp_std_pm_cpu_01
# base PAW set + W semi-core potential (from vasp-ase-sp.py); change per element as needed.
setups = recommended W:_sv
# PARALLELIZATION ONLY (does not affect the converged result): with -n 8 the whole job is one
# k-group of 8 ranks (KPAR=1, NCORE=8 -> NPAR=1) -- pure band/FFT parallelism, no k-group replication.
# KPAR*NCORE must divide -n; >=4 ranks/k-group is the SEGV-safe floor (KPAR=1 -> 8/group is safe). Every
# NUMERIC/accuracy setting (encut, ediff, ismear, sigma, prec, nelm, xc, pp, lorbit) comes from
# vasp-ase-sp.py via the backend defaults -- do not override those here.
kpar = 1
ncore = 8
# Coarsened k-mesh for the training set (overrides the vasp-ase-sp.py default of 0.125). At 0.125
# these small cells generate 200-477 irreducible k-points (~30-60 min/SP); 0.2 gives ~8x fewer
# k-points (~5-10 min/SP) with negligible impact on MLIP training forces/energies. Lower toward
# 0.125 if you need maximum fidelity (and budget the much longer runtime).
kspacing = 0.2

# featurize peaked at only ~3 CONCURRENT tasks across the whole 500-run (over-provisioned), so 2 jobs
# x 2 cores/node is ample (across 16 nodes = 32 featurize workers); frees cores for labeling.
[ourFeaturization]
featurize_jobs_per_node = 2
featurize_cores_per_job = 2

[ourFit]
fit_jobs_per_node = 2
# fit is torch.linalg.svd on the small incremental R-factor (features^2) and finishes EARLY (not the
# bottleneck), so 2 cores is ample; <=labeling_cores_per_job keeps the reclaim from oversubscribing.
fit_cores_per_job = 2
fit_method = svd
n_fold = 3
fit_engine = incremental

[ourHyperparameters]
min_rcut = 5
max_rcut = 6
num_rcut = 3
min_nmax = 8 3
max_nmax = 10 4
min_lmax = 0 1
max_lmax = 0 2
middle_eweight = 10
num_eweights = 3
